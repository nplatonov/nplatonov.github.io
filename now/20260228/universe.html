 #### Построение траектории

   + Фильтрация локаций по порогу скорости смещения <span class="cite hovertext" data-hover="A simple new algorithm to filter marine mammal Argos locations"><a name=cite-Argos-filter></a>([Freitas et al., 2008](#bib))</span>.

   + Исключение локаций вручную и повторение фильтрации

      + На 24 февраля 2026 г. для одной особи одна локация в море Лаптевых

   + Модель простого случайного блуждания <span class="cite hovertext" data-hover="Movement responses to environment: fast inference of variation among southern elephant seals with a mixed effects model"><a name=cite-Jonsen2019></a>([Jonsen et al., 2019](#bib))</span>, <span class="cite hovertext" data-hover="A continuous-time state-space model for rapid quality-control of Argos locations from animal-borne tags"><a name=cite-Jonsen2020></a>([Jonsen et al., 2020](#bib))</span> для построения ежесуточных локаций на 12:00 <abbr title="единое скоординированное время, единое время">UTC</abbr>


 #### Оценка длины шага суточного смещения

   + Фильтрация локаций по площади эллипса ошибки, прямолинейности перемещения и величине смещения.

]
.pull-right-30[

<img src="assets/locfilter.png" alt="" width="1330" height="700" style="display: block; margin: auto auto auto 0;" />

]
]












.footer[
Data processing includes applying of Argos filter to locations and interactive removing undesirable locations. Random walk modelling was used to estimate daily locations at noon UTC. Locations with high value of errors and over-straightforwardness were removed before 'daily displacement' parameter was estimated.
]


]
]

One metric, extracted from biotelemetry analysis, is the distance between two locations over a twenty-four-hour period, or daily displacement.

.grey[
It was low until mid-October 2024, with values close to zero. Then, polar bear mobility increased, with non-zero values prevailing until December 2024. The next active period was between February and April. In May, the number of data points increased as a result of new tagging. A decrease in mobility is observed in August and September 2025, and is associated with the ice-free period.
