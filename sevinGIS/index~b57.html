+ Сделать в Print Layout / Менеджере для печати

+ Север вверху; одна (лучше центральная) долгота должна быть вертикальной

+ Сетка широт/долгот слишком бросается в глаза, но это второстепенная информация. Подписи для проку

+ "Апатиты" теряются на фоне береговой линии озёр

+ Если подписаны территории по административному делению, должна читаться граница, относящаяся к этому делению, либо раскраска

+ В батиметрии переход между градациями должен быть плавным, без контрастной линии. Подписи или легенда.

+ "Европа" на Кольском полуострове. Нужен ли этот акцент? Если бы еще попадала "Азия" в пространственный охват, то смысловая нагрузка была бы в сравнении.

+ Размеры шрифтов в зависимости от иерархии административных делений

+ Получится ли "Среднерусскую равнину" не размещать над Белым морем?

 #### Савельева Ксения

Большой опыт работы с ГИС, в Универе два курса, MapInfo. QGIS самостоятельно изучала, было достаточно легко. Рисовала карты в офисе. QGIS применяла для рисования карты для статьи. 

Владеет R, был курс в универе: для стат обработки данных, моделирования ареала, курс Лисовского. Очень любит карты.

В аспирантуре хотим нарисовать изотопную карту, должна изображать изотопный состав почвы, максимум - растений. Два изотопа, на отдельных станциях, научиться экстраполировать на территорию.
