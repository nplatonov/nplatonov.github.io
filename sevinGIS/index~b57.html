.font99[

| | |
:-|:--------------
Выдано|  20 февраля
Сдача| 24 февраля 15:00 Мск UTC+03
Программное обеспечение| QGIS
Цель| Научиться оперировать с инструментами QGIS для получения данных и оформления слоев проекта, включая стили оформления и подписи топонимов
Задание| На основе данных Natural Earth 1:10m cоздать картооснову, ориентируясь на территорию, охватывающую Карелию и Мурманскую области и на Ваш район исследований. Желательно включить административные границы, батиметрию и контуры высот. Экспортировать через Export Image или Print Layout изображения, соответствующих русскоязычным журнальным требованиям, с различным пространственным охватом: 1) только Кольский п-ов, 2) вместе Карелия и Мурманская обл, 3) свой район работ для описания изучаемой территории в разделе «Методы», 4) свой район работ для использования в качестве подложки для «Результатов».
Отчетность| 1. PNG/TIFF/PDF с охватом Кольского полуострова<br>2. PNG/TIFF/PDF с охватом Карелии и Мурманской обл.<br>3. PNG/TIFF/PDF района исследований с для раздела «Методы».<br>4. PNG/TIFF/PDF района исследований как подложка для «Результатов».
Подсказки| Данные [Natural Earth World GIS Data](https://www.naturalearthdata.com/).<br>Посмотреть также OSM данные по [регионам России](https://download.geofabrik.de/russia.html) на сайте проекта [Geofabrik](https://www.geofabrik.de/) для крупномасштабных карт.<br>Обратить внимание на присутствие в атрибутивной таблице русскоязычных полей.

]

+ Сделать в Print Layout / Менеджере для печати

+ Север вверху; одна (лучше центральная) долгота должна быть вертикальной

+ Сетка широт/долгот слишком бросается в глаза, но это второстепенная информация. Подписи для проку

+ "Апатиты" теряются на фоне береговой линии озёр

+ Если подписаны территории по административному делению, должна читаться граница, относящаяся к этому делению, либо раскраска

+ В батиметрии переход между градациями должен быть плавным, без контрастной линии. Подписи или легенда.

+ "Европа" на Кольском полуострове. Нужен ли этот акцент? Если бы еще попадала "Азия" в пространственный охват, то смысловая нагрузка была бы в сравнении.

+ Размеры шрифтов в зависимости от иерархии административных делений

+ Получится ли "Среднерусскую равнину" не размещать над Белым морем?

+ Повторение "Карелия"/"Карелия", "Лапландия"/"Лапландия". Лишний слой?

+ В Оренбуржье слишком густая координатная сетка

+ В Результатах нет координатной сетки, подложка (растр?) бледная, а дороги(?) контрстные. Красная линии - изучаемая территория? Нужна легенда для линейных объектов и для тёмного пятна

# ==============================================================================
# Карта Австралии со штатами и городами
# ==============================================================================

# — Директория ------------------------------------------------------------
root <- "/Users/ksusasaveleva/R_projects/Modeling/Modeling/ne_10m_countries"

output_dir <- file.path(root, "output")

if (!dir.exists(output_dir)) {
  dir.create(output_dir, recursive = TRUE)
  message("Done")
}
# — Библиотеки -------------------------------------------------------------
library(sf)
library(tmap)
library(ggplot2)
library(ggrepel)
library(rnaturalearth)
library(rnaturalearthdata)
library(dplyr)

# Загрузка данных ---------------------------------------------------------------
countries <- st_read(file.path(root, paste0("ne_10m_admin_0_countries.shp")))
states <- st_read(file.path(root,paste0("ne_10m_admin_1_states_provinces.shp")))
cities <- st_read(file.path(root,paste0("ne_10m_populated_places.shp")))

aus_states <- states[states$admin == "Australia", ]
cities_aus <- cities[cities$ADM0NAME == "Australia" & 
                       cities$POP_MAX > 200000, ]

cities_aus$NAME <- case_when(
  cities_aus$NAME == "Perth" ~ "Перт",
  cities_aus$NAME == "Melbourne" ~ "Мельбурн",
  cities_aus$NAME == "Brisbane" ~ "Брисбен",
  cities_aus$NAME == "Adelaide" ~ "Аделаида",
  cities_aus$NAME == "Canberra" ~ "Канберра",
  cities_aus$NAME == "Hobart" ~ "Хобарт",
  cities_aus$NAME == "Sydney" ~ "Сидней",
  cities_aus$NAME == "Newcastle" ~ "Ньюкастл",
  cities_aus$NAME == "Cranbourne" ~ "Кранборн",
  cities_aus$NAME == "Townsville" ~ "Таунсвилл",
  cities_aus$NAME == "Geelong" ~ "Джелонг",
  cities_aus$NAME == "Gold Coast" ~ "Голд-Кост",
  cities_aus$NAME == "Cairns" ~ "Кэрнс",
  cities_aus$NAME == "Wollongong" ~ "Вуллонгонг",
  TRUE ~ cities_aus$NAME
)

# — Карта ---------------------------------------------------------------
map_plot <- ggplot() +
  geom_sf(data = aus_states, 
          aes(fill = name),
          color = "black", size = 0.2, alpha = 0.7) +
  geom_sf(data = cities_aus, color = "darkblue", size = 2, alpha = 0.8) +
  geom_text_repel(
    data = cities_aus,
    aes(label = NAME, geometry = geometry),
    stat = "sf_coordinates",
    min.segment.length = 0,
    box.padding = 0.5,
    point.padding = 0.3,
    force = 2,
    size = 4,
    color = "darkblue",
    bg.color = "white",
    bg.r = 0.1
  ) +
  labs(title = "Карта Австралии") +
  theme_minimal()+
  xlab("Долгота") + ylab("Широта")+
  theme(
    legend.position = "none"  # полностью убирает легенду
  )
print(map_plot)
ggsave("output/australia_final.png", plot = map_plot, width = 12, height = 10, 
       dpi = 300, bg = "white", units = "in")

# ==============================================================================
# Карта Австралии со штатами и городами
# ==============================================================================

# — Директория ------------------------------------------------------------
root <- "/Users/ksusasaveleva/R_projects/Modeling/Modeling/ne_10m_countries"

output_dir <- file.path(root, "output")
if (!dir.exists(output_dir)) {
  dir.create(output_dir, recursive = TRUE)
  message("Done")
}
# — Библиотеки -------------------------------------------------------------
library(sf)
library(tmap)
library(ggplot2)
library(ggrepel)
library(ggspatial)
library(dplyr)
library(ursa)

# Загрузка данных ---------------------------------------------------------------
countries <- st_read(file.path(root, paste0("ne_10m_admin_0_countries.shp")))
states <- st_read(file.path(root,paste0("ne_10m_admin_1_states_provinces.shp")))
cities <- st_read(file.path(root,paste0("ne_10m_populated_places.shp")))

aus_states <- states[states$admin == "Australia", ]
cities_aus <- cities[cities$ADM0NAME == "Australia" & cities$POP_MAX > 200000, ]
state_labels <- states[states$admin == "Australia", c("name_ru")]

aus_states_proj <- st_transform(aus_states, 3577)
aus_city_proj <- st_transform(cities_aus, 3577)

state_labels_proj <- st_transform(state_labels, 3577) %>%
  mutate(
    label_point = st_point_on_surface(geometry),
    name_label = gsub(" ", "\n", name_ru)
  ) %>%
  filter(!name_ru %in% c("Виктория", "Маккуори", "Тасмания", "остров Лорд-Хау"))
# — Карта ---------------------------------------------------------------
map_plot <- ggplot() +
  geom_sf(data = aus_states_proj, aes(fill = name), 
          color = "darkslategrey", size = 1, alpha = 0.7) +
  geom_sf(data = aus_city_proj, color = "deeppink4", size = 3) +
  geom_text_repel(data = state_labels_proj, 
                  aes(label = name_label, geometry = geometry),
                  color = "bisque3", 
                  stat = "sf_coordinates",
                  size = 5,
                  bg.color = "white")+
  geom_text_repel(data = aus_city_proj,
    aes(label = NAME_RU, geometry = geometry),
    stat = "sf_coordinates",
    min.segment.length = 0,box.padding = 0.5,
    point.padding = 0.3,force = 2,
    size = 6,color = "darkblue",
    bg.color = "white", bg.r = 0.1) +
  labs(title = "Карта Австралии") +
  theme_bw()+
  theme(title = element_text(size = 20))+
  xlab(" ") + ylab(" ")+
  theme(legend.position = "none") +
  coord_sf(crs = 3577,
           xlim = c(-2000000, 2500000),
           ylim = c(-4500000, -1000000),
           expand = FALSE) +
  scale_x_continuous(breaks = seq(110, 160, by = 10)) +
  scale_y_continuous(breaks = seq(-45, -10, by = 10)) +
  annotation_scale(location = "bl", width_hint = 0.2)
print(map_plot)

ggsave(file.path(root, "output/australia_final2.png"), 
       plot = map_plot, width = 12, height = 10, 
        dpi = 300, bg = "white", units = "in")

# ==============================================================================
# Карта Австралии со штатами и городами через библиотеку tmap
# ==============================================================================
# installing --------------------------------------------------------------
library(tmap)
library(sf)
library(ggplot2)
library(dplyr)
# — Директория ------------------------------------------------------------
root <- "/Users/ksusasaveleva/R_projects/Modeling/Modeling/ne_10m_countries"
# Preparing ---------------------------------------------------------------
countries <- st_read(file.path(root, paste0("ne_10m_admin_0_countries.shp")))
states <- st_read(file.path(root,paste0("ne_10m_admin_1_states_provinces.shp")))
cities <- st_read(file.path(root,paste0("ne_10m_populated_places.shp")))
seas <- st_read(file.path(root,paste0("ne_10m_geography_marine_polys.shp")))
ocean <- st_read(file.path(root,paste0("ne_10m_ocean.shp")))

aus_states <- states[states$admin == "Australia", ]
cities_aus <- cities[cities$ADM0NAME == "Australia" & cities$POP_MAX > 200000, ]
state_labels <- states[states$admin == "Australia", c("name_ru")]
countries_oceania <- countries[countries$CONTINENT == "Oceania"
                               | countries$CONTINENT == "Asia", c("NAME_RU")]
countries_oceania <-  st_transform(countries_oceania, 3577)
aus_states_proj <- st_transform(aus_states, 3577)
aus_city_proj <- st_transform(cities_aus, 3577)|>
  filter(!is.na(NAME_RU))

state_labels_proj <- st_transform(state_labels, 3577) |>
  mutate(label_point = st_point_on_surface(geometry),
    name_label = gsub(" ", "\n", name_ru)) |>
  filter(!name_ru %in% c("Виктория", "Маккуори", "Тасмания", 
                         "остров Лорд-Хау", "Территория Джервис-Бей",
                         "Австралийская столичная территория"))
seas_label_proj <- st_transform(seas, 3577) |>
  filter(name_ru %in% c ("Коралловое море", "Тасманово море",
                          "Тиморское море", "Арафурское море"))
ocean <- st_transform(ocean, 3577)

# map_borders -------------------------------------------------------------
bbox_current <- st_bbox(state_labels_proj)
x_range <- bbox_current["xmax"] - bbox_current["xmin"]
y_range <- bbox_current["ymax"] - bbox_current["ymin"]
bbox_new <- bbox_current
bbox_new["xmin"] <- bbox_current["xmin"] - (0.05 * x_range) # Влево
bbox_new["xmax"] <- bbox_current["xmax"] + (0.35 * x_range) # Вправо
bbox_new["ymin"] <- bbox_current["ymin"] - (0.15 * y_range) # Вниз
bbox_new["ymax"] <- bbox_current["ymax"] + (0.15 * y_range) # Вверх
bbox_new_sfc <- st_as_sfc(bbox_new)

# map ---------------------------------------------------------------------
tmap_plot <- tm_shape(countries_oceania, bbox = bbox_new_sfc) +
  tm_polygons(fill = "mistyrose", 
              col = "mistyrose",            
              lwd = 0.5) +
# океан
  tm_shape(ocean)+
  tm_polygons("featurecla", 
              col = "lightsteelblue1",
              palette = c("lightsteelblue1"))+
# штаты  
  tm_shape(state_labels_proj) +
  tm_polygons("name_ru", fill.legend = tm_legend_hide(),
              palette = "rd_yl_bu")+
  tm_layout(color.saturation = 0.5)+
  tm_graticules(col = "dimgray", lwd = 0.3, n.x = 4, n.y = 3, labels.size = 0.7)+
  tm_text("name_label", size = 1, 
          col = "black", 
          alpha = 0.7) +
# моря
  tm_shape(seas_label_proj, is.main = FALSE)+
  tm_text("name_ru", size = 0.8, 
          col = "cyan4",
          fontface = "italic",
          auto.placement = TRUE,
          remove.overlap = TRUE,
          options = opt_tm_text(point.label = TRUE, halo = TRUE, halo.width = 0.1),
          xmod = 1, ymod = 1)+
# города
  tm_shape(aus_city_proj)+
  tm_dots(size = 0.5, col = "blue4", shape = 21) +
  tm_text("NAME_RU",
          point.label.gap = 0.4,
          point.label.method = "SANN",
          size = 0.7, fontface = "bold",
          options = opt_tm_text(point.label = TRUE, halo = TRUE, halo.width = 0.1),
          xmod = -0.3, ymod = -0.3) +
  tm_scalebar(position = c("left", "bottom"), text.size = 0.6) +
  tm_title("Австралия", 
           size = 1.5,
           color = "gray10",
           fontface = "bold")+
  tm_layout(frame.r = 10, frame.double_line = TRUE)+
  tm_legend_hide()
print(tmap_plot)

library(sf)
library(dplyr)
library(ggplot2)
library(ggrepel)
library(ggspatial)

options(warn = -1)

root <- "C:/Users/Tungus333/Desktop/GIS"

countries <- st_read(file.path(root, "ne_10m_admin_0_countries", "ne_10m_admin_0_countries.shp"))
rivers_aus <- st_read(file.path(root, "ne_10m_rivers_australia", "ne_10m_rivers_australia.shp"))
lakes_aus <- st_read(file.path(root, "ne_10m_lakes_australia", "ne_10m_lakes_australia.shp"))
cities <- st_read(file.path(root, "ne_10m_populated_places", "ne_10m_populated_places.shp"))
states <- st_read(file.path(root, "ne_10m_admin_1_states_provinces", "ne_10m_admin_1_states_provinces.shp"))

australia <- countries %>% filter(NAME == "Australia")
cities_aus <- cities %>% filter(ADM0NAME == "Australia")
states_aus <- states %>% filter(admin == "Australia")

target_cities <- c("Darwin", "Townsville", "Alice Springs", "Brisbane", 
                   "Perth", "Adelaide", "Newcastle", "Sydney", "Melbourne", 
                   "Canberra", "Hobart", "Cairns", "Gold Coast", "Wollongong")

major_cities <- cities_aus %>% filter(NAME %in% target_cities)

if(nrow(major_cities) < length(target_cities)) {
    pattern <- paste(target_cities, collapse = "|")
    major_cities <- cities_aus %>% 
        filter(grepl(pattern, NAME, ignore.case = TRUE))
}

city_names_ru <- c(
    "Дарвин" = "Darwin", "Таунсвилл" = "Townsville", "Алис-Спрингс" = "Alice Springs",
    "Брисбен" = "Brisbane", "Перт" = "Perth", "Аделаида" = "Adelaide",
    "Ньюкасл" = "Newcastle", "Сидней" = "Sydney", "Мельбурн" = "Melbourne",
    "Канберра" = "Canberra", "Хобарт" = "Hobart", "Кэрнс" = "Cairns",
    "Голд-Кост" = "Gold Coast", "Вуллонгонг" = "Wollongong"
)

major_cities$name_ru <- names(city_names_ru)[match(major_cities$NAME, city_names_ru)]

state_labels <- data.frame(
    name = c("СЕВЕРНАЯ ТЕРРИТОРИЯ", "КВИНСЛЕНД", "ЗАПАДНАЯ АВСТРАЛИЯ", 
             "ЮЖНАЯ АВСТРАЛИЯ", "НОВЫЙ ЮЖНЫЙ УЭЛЬС", "ВИКТОРИЯ", 
             "ТАСМАНИЯ", "АВСТРАЛИЯ"),
    lon = c(133.5, 144.0, 120.0, 135.0, 147.0, 143.0, 147.0, 132.0),
    lat = c(-20.0, -22.0, -25.0, -30.0, -33.0, -37.0, -42.0, -27.0)
) %>% st_as_sf(coords = c("lon", "lat"), crs = 4326)

sea_labels <- data.frame(
    name = c("ТИМОРСКОЕ МОРЕ", "МОРЕ САВУ", "ТАСМАНОВО МОРЕ", "АРАФУРСКОЕ МОРЕ"),
    lon = c(124.0, 123.0, 155.0, 135.0),
    lat = c(-11.0, -9.5, -38.0, -10.0)
) %>% st_as_sf(coords = c("lon", "lat"), crs = 4326)

bbox <- st_bbox(c(xmin = 110, xmax = 160, ymin = -45, ymax = -5), crs = 4326)
sea_poly <- st_as_sfc(bbox) %>% st_sf()

map_final <- ggplot() +
    geom_sf(data = sea_poly, fill = "#e6f0fa", color = NA) +
    geom_vline(xintercept = seq(110, 160, 10), color = "#cccccc", linewidth = 0.2) +
    geom_hline(yintercept = seq(-45, -5, 5), color = "#cccccc", linewidth = 0.2) +
    annotate("text", x = seq(110, 160, 10), y = -4, 
             label = c("110° в.д.", "120° в.д.", "130° в.д.", "140° в.д.", 
                       "150° в.д.", "160° в.д."),
             size = 3, color = "#333333", bg.color = "white", bg.r = 0.1) +
    annotate("text", x = 109, y = seq(-45, -5, 5), 
             label = c("45° ю.ш.", "40° ю.ш.", "35° ю.ш.", "30° ю.ш.", "25° ю.ш.", 
                       "20° ю.ш.", "15° ю.ш.", "10° ю.ш.", "5° ю.ш."),
             size = 3, color = "#333333", hjust = 1, bg.color = "white", bg.r = 0.1) +
    geom_sf(data = australia, fill = "#f0f0f0", color = "#333333", linewidth = 0.4) +
    geom_sf(data = states_aus, fill = NA, color = "#FF6B6B", linewidth = 0.6, linetype = "dashed") +
    geom_sf(data = lakes_aus, fill = "#b0d0e0", color = "#4B7B9C", linewidth = 0.2) +
    geom_sf(data = rivers_aus, color = "#4B7B9C", linewidth = 0.2, alpha = 0.8) +
    geom_sf(data = major_cities, color = "#000000", size = 2, shape = 16) +
    geom_text_repel(data = major_cities,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 3.5, box.padding = 0.5, point.padding = 0.3,
                    segment.color = "#999999", min.segment.length = 0.1,
                    max.overlaps = 20, bg.color = "white", bg.r = 0.15) +
    geom_text(data = state_labels,
              aes(label = name, geometry = geometry),
              stat = "sf_coordinates",
              size = 5, fontface = "bold", color = "#000000",
              bg.color = "white", bg.r = 0.2) +
    geom_text(data = sea_labels,
              aes(label = name, geometry = geometry),
              stat = "sf_coordinates",
              size = 4, fontface = "italic", color = "#2A5F8A",
              bg.color = "white", bg.r = 0.15) +
    annotation_scale(location = "bl", 
                     width_hint = 0.18,
                     height = unit(0.2, "cm"),
                     line_width = 1,
                     bar_cols = c("black", "white"),
                     text_col = "black",
                     text_cex = 0.9) +
    coord_sf(xlim = c(110, 160), ylim = c(-45, -5), expand = FALSE) +
    theme_minimal() +
    theme(
        panel.grid.major = element_blank(),
        panel.grid.minor = element_blank(),
        panel.background = element_rect(fill = "#e6f0fa", color = NA),
        axis.text = element_blank(),
        axis.title = element_blank(),
        plot.title = element_text(hjust = 0.5, size = 16, face = "bold")
    ) +
    labs(title = "АВСТРАЛИЯ")

print(map_final)

ggsave("australia_final_fixed.png", map_final, width = 11, height = 9, dpi = 300, bg = "white")
cairo_pdf("australia_final_fixed.pdf", width = 11, height = 9)
print(map_final)
dev.off()

library(sf)
library(dplyr)
library(ggplot2)
library(ggrepel)
library(ggspatial)

options(warn = 0)

root <- "C:/Users/Tungus333/Desktop/GIS"

countries <- st_read(file.path(root, "ne_10m_admin_0_countries", "ne_10m_admin_0_countries.shp"))
rivers_aus <- st_read(file.path(root, "ne_10m_rivers_australia", "ne_10m_rivers_australia.shp"))
lakes_aus <- st_read(file.path(root, "ne_10m_lakes_australia", "ne_10m_lakes_australia.shp"))
cities <- st_read(file.path(root, "ne_10m_populated_places", "ne_10m_populated_places.shp"))
states <- st_read(file.path(root, "ne_10m_admin_1_states_provinces", "ne_10m_admin_1_states_provinces.shp"))

crs_aus <- 3577

australia <- countries %>% 
    filter(NAME == "Australia") %>%
    st_transform(crs_aus)

cities_aus <- cities %>% 
    filter(ADM0NAME == "Australia") %>%
    st_transform(crs_aus)

states_aus <- states %>% 
    filter(admin == "Australia") %>%
    st_transform(crs_aus)

rivers_aus <- st_transform(rivers_aus, crs_aus)
lakes_aus <- st_transform(lakes_aus, crs_aus)

city_names_ru <- c(
    "Дарвин" = "Darwin", 
    "Таунсвилл" = "Townsville", 
    "Алис-Спрингс" = "Alice Springs",
    "Брисбен" = "Brisbane", 
    "Перт" = "Perth", 
    "Аделаида" = "Adelaide",
    "Ньюкасл" = "Newcastle", 
    "Сидней" = "Sydney", 
    "Мельбурн" = "Melbourne",
    "Канберра" = "Canberra", 
    "Хобарт" = "Hobart", 
    "Кэрнс" = "Cairns",
    "Голд-Кост" = "Gold Coast", 
    "Вуллонгонг" = "Wollongong"
)

target_cities <- names(city_names_ru)

major_cities <- cities_aus %>% 
    filter(NAME %in% city_names_ru) %>%
    mutate(name_ru = names(city_names_ru)[match(NAME, city_names_ru)])


sea_labels <- data.frame(
    name_ru = c("ТИМОРСКОЕ МОРЕ", "МОРЕ САВУ", "АРАФУРСКОЕ МОРЕ", "ТАСМАНОВО МОРЕ"),
    lon = c(122.0, 121.5, 134.0, 158.0),
    lat = c(-10.5, -9.0, -9.5, -40.0)
) %>% 
    st_as_sf(coords = c("lon", "lat"), crs = 4326) %>% 
    st_transform(crs_aus)

lon_breaks_deg <- seq(110, 160, 10)
lat_breaks_deg <- seq(-45, -5, 5)

create_meridian <- function(lon_value) {
    points <- data.frame(
        lon = rep(lon_value, 100),
        lat = seq(-5, -48, length.out = 100)
    ) %>%
        st_as_sf(coords = c("lon", "lat"), crs = 4326)
    
    line <- points %>%
        summarise(geometry = st_combine(geometry)) %>%
        st_cast("LINESTRING") %>%
        st_transform(crs_aus)
    
    return(line)
}

create_parallel <- function(lat_value) {
    points <- data.frame(
        lon = seq(105, 165, length.out = 100),
        lat = rep(lat_value, 100)
    ) %>%
        st_as_sf(coords = c("lon", "lat"), crs = 4326)
    
    line <- points %>%
        summarise(geometry = st_combine(geometry)) %>%
        st_cast("LINESTRING") %>%
        st_transform(crs_aus)
    
    return(line)
}

meridians_list <- lapply(lon_breaks_deg, create_meridian)
meridians <- do.call(rbind, meridians_list)

parallels_list <- lapply(lat_breaks_deg, create_parallel)
parallels <- do.call(rbind, parallels_list)

bbox_aus <- st_bbox(australia)
x_range <- bbox_aus["xmax"] - bbox_aus["xmin"]
y_range <- bbox_aus["ymax"] - bbox_aus["ymin"]

lon_labels_sf <- st_sfc(lapply(lon_breaks_deg, function(x) st_point(c(x, -48))), crs = 4326)
lon_labels_3577 <- st_coordinates(st_transform(lon_labels_sf, crs_aus))[, "X"]

lat_labels_sf <- st_sfc(lapply(lat_breaks_deg, function(y) st_point(c(105, y))), crs = 4326)
lat_labels_3577 <- st_coordinates(st_transform(lat_labels_sf, crs_aus))[, "Y"]

xlims <- bbox_aus[c("xmin", "xmax")]
ylims <- bbox_aus[c("ymin", "ymax")]

xlims_expanded <- xlims + c(-0.15 * x_range, 0.15 * x_range)
ylims_expanded <- ylims + c(-0.15 * y_range, 0.15 * y_range)

map_final <- ggplot() +
    geom_sf(data = australia, fill = "#f0f0f0", color = "#333333", linewidth = 0.4) +
    geom_sf(data = lakes_aus, fill = "#b0d0e0", color = "#4B7B9C", linewidth = 0.2) +
    geom_sf(data = rivers_aus, color = "#4B7B9C", linewidth = 0.2, alpha = 0.8) +
    geom_sf(data = meridians, color = "#666666", linewidth = 0.3) +
    geom_sf(data = parallels, color = "#666666", linewidth = 0.3) +
    geom_sf(data = states_aus, fill = NA, color = "#FF6B6B", linewidth = 0.6, linetype = "dashed") +
    geom_sf(data = major_cities, color = "#000000", size = 2, shape = 16) +
    geom_text_repel(data = major_cities,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 3.5,
                    box.padding = 1.2,
                    point.padding = 1.0,
                    force = 3,
                    segment.color = "#999999",
                    min.segment.length = 0.1,
                    max.overlaps = 50,
                    bg.color = "white",
                    bg.r = 0.15) +
    geom_text(data = states_aus,
              aes(label = name_ru, geometry = geometry),
              stat = "sf_coordinates",
              size = 5,
              fontface = "bold",
              color = "#000000",
              bg.color = "white",
              bg.r = 0.2,
              check_overlap = TRUE) +
    geom_text_repel(data = sea_labels,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 4,
                    fontface = "italic",
                    color = "#2A5F8A",
                    box.padding = 2.0,
                    point.padding = 1.5,
                    force = 5,
                    segment.color = NA,
                    bg.color = "white",
                    bg.r = 0.15,
                    min.segment.length = Inf) +
    annotate("text", 
             x = lon_labels_3577, 
             y = ylims[1] - 0.05 * y_range,
             label = paste0(lon_breaks_deg, "° в.д."),
             size = 3.5, 
             color = "#333333",
             fontface = "bold") +
    annotate("text", 
             x = rep(xlims[1] - 0.05 * x_range, length(lat_breaks_deg)), 
             y = lat_labels_3577,
             label = paste0(abs(lat_breaks_deg), "° ю.ш."),
             size = 3.5, 
             color = "#333333", 
             hjust = 1,
             fontface = "bold") +
    annotation_scale(location = "bl",
                     width_hint = 0.18,
                     height = unit(0.2, "cm"),
                     line_width = 1,
                     bar_cols = c("black", "white"),
                     text_col = "black",
                     text_cex = 0.9) +
    coord_sf(xlim = xlims_expanded,
             ylim = ylims_expanded,
             expand = FALSE,
             crs = crs_aus) +
    theme_minimal() +
    theme(
        panel.grid.major = element_blank(),
        panel.grid.minor = element_blank(),
        panel.background = element_rect(fill = "#e6f0fa", color = "black", linewidth = 0.5),
        panel.border = element_rect(color = "black", fill = NA, linewidth = 0.5),
        axis.text = element_blank(),
        axis.title = element_blank(),
        axis.ticks = element_blank(),
        plot.title = element_text(hjust = 0.5, size = 16, face = "bold"),
        plot.margin = margin(2, 2, 2, 4, "cm")
    ) +
    labs(title = "АВСТРАЛИЯ (Australian Albers / EPSG:3577)")

print(map_final)

ggsave("australia_albers_3577_curved.png", map_final, width = 15, height = 12, dpi = 300, bg = "white")
cairo_pdf("australia_albers_3577_curved.pdf", width = 15, height = 12)
print(map_final)
dev.off()

cat("\n✅ Карта сохранена в:", getwd(), "\n")
cat("   - australia_albers_3577_curved.png\n")
cat("   - australia_albers_3577_curved.pdf\n")
```

library(sf)
library(dplyr)
library(ggplot2)
library(ggrepel)
library(ggspatial)

options(warn = 0)

root <- "C:/Users/Tungus333/Desktop/GIS"

countries <- st_read(file.path(root, "ne_10m_admin_0_countries", "ne_10m_admin_0_countries.shp"))
rivers_aus <- st_read(file.path(root, "ne_10m_rivers_australia", "ne_10m_rivers_australia.shp"))
lakes_aus <- st_read(file.path(root, "ne_10m_lakes_australia", "ne_10m_lakes_australia.shp"))
cities <- st_read(file.path(root, "ne_10m_populated_places", "ne_10m_populated_places.shp"))
states <- st_read(file.path(root, "ne_10m_admin_1_states_provinces", "ne_10m_admin_1_states_provinces.shp"))

crs_aus <- 3577

australia <- countries %>% 
    filter(NAME == "Australia") %>%
    st_transform(crs_aus)

cities_aus <- cities %>% 
    filter(ADM0NAME == "Australia") %>%
    st_transform(crs_aus)

states_aus <- states %>% 
    filter(admin == "Australia") %>%
    st_transform(crs_aus)

rivers_aus <- st_transform(rivers_aus, crs_aus)
lakes_aus <- st_transform(lakes_aus, crs_aus)

city_names_ru <- c(
    "Дарвин" = "Darwin", 
    "Таунсвилл" = "Townsville", 
    "Алис-Спрингс" = "Alice Springs",
    "Брисбен" = "Brisbane", 
    "Перт" = "Perth", 
    "Аделаида" = "Adelaide",
    "Ньюкасл" = "Newcastle", 
    "Сидней" = "Sydney", 
    "Мельбурн" = "Melbourne",
    "Канберра" = "Canberra", 
    "Хобарт" = "Hobart", 
    "Кэрнс" = "Cairns",
    "Голд-Кост" = "Gold Coast", 
    "Вуллонгонг" = "Wollongong"
)

major_cities <- cities_aus %>% 
    filter(NAME %in% city_names_ru) %>%
    mutate(name_ru = names(city_names_ru)[match(NAME, city_names_ru)])

state_label_positions <- data.frame(
    name_ru = c("СЕВЕРНАЯ ТЕРРИТОРИЯ", "КВИНСЛЕНД", "ЗАПАДНАЯ АВСТРАЛИЯ", 
                "ЮЖНАЯ АВСТРАЛИЯ", "НОВЫЙ ЮЖНЫЙ УЭЛЬС", "ВИКТОРИЯ", 
                "ТАСМАНИЯ"),
    lon = c(133.5, 144.5, 122.5, 135.5, 145.5, 143.5, 145.5),
    lat = c(-20.0, -22.0, -26.5, -31.5, -33.0, -37.5, -42.0)
) %>%
    st_as_sf(coords = c("lon", "lat"), crs = 4326) %>%
    st_transform(crs_aus)

sea_labels <- data.frame(
    name_ru = c("ТИМОРСКОЕ МОРЕ", "МОРЕ САВУ", "АРАФУРСКОЕ МОРЕ", "ТАСМАНОВО МОРЕ"),
    lon = c(122.0, 121.5, 134.0, 159.0),
    lat = c(-9.5, -9.0, -9.5, -40.0)
) %>% 
    st_as_sf(coords = c("lon", "lat"), crs = 4326) %>% 
    st_transform(crs_aus)

lon_breaks_deg <- seq(110, 160, 10)
lat_breaks_deg <- seq(-45, -5, 5)

create_meridian <- function(lon_value) {
    points <- data.frame(
        lon = rep(lon_value, 100),
        lat = seq(-5, -50, length.out = 100)
    ) %>%
        st_as_sf(coords = c("lon", "lat"), crs = 4326)
    
    line <- points %>%
        summarise(geometry = st_combine(geometry)) %>%
        st_cast("LINESTRING") %>%
        st_transform(crs_aus)
    
    return(line)
}

create_parallel <- function(lat_value) {
    points <- data.frame(
        lon = seq(105, 165, length.out = 100),
        lat = rep(lat_value, 100)
    ) %>%
        st_as_sf(coords = c("lon", "lat"), crs = 4326)
    
    line <- points %>%
        summarise(geometry = st_combine(geometry)) %>%
        st_cast("LINESTRING") %>%
        st_transform(crs_aus)
    
    return(line)
}

meridians_list <- lapply(lon_breaks_deg, create_meridian)
meridians <- do.call(rbind, meridians_list)

parallels_list <- lapply(lat_breaks_deg, create_parallel)
parallels <- do.call(rbind, parallels_list)

bbox_aus <- st_bbox(australia)
x_range <- bbox_aus["xmax"] - bbox_aus["xmin"]
y_range <- bbox_aus["ymax"] - bbox_aus["ymin"]

lon_labels_sf <- st_sfc(lapply(lon_breaks_deg, function(x) st_point(c(x, -48))), crs = 4326)
lon_labels_3577 <- st_coordinates(st_transform(lon_labels_sf, crs_aus))[, "X"]

lat_labels_sf <- st_sfc(lapply(lat_breaks_deg, function(y) st_point(c(105, y))), crs = 4326)
lat_labels_3577 <- st_coordinates(st_transform(lat_labels_sf, crs_aus))[, "Y"]

xlims <- bbox_aus[c("xmin", "xmax")]
ylims <- bbox_aus[c("ymin", "ymax")]

xlims_expanded <- xlims + c(-0.15 * x_range, 0.15 * x_range)
ylims_expanded <- ylims + c(-0.15 * y_range, 0.15 * y_range)

map_final <- ggplot() +
    geom_sf(data = australia, fill = "#f0f0f0", color = "#333333", linewidth = 0.4) +
    geom_sf(data = lakes_aus, fill = "#b0d0e0", color = "#4B7B9C", linewidth = 0.2) +
    geom_sf(data = rivers_aus, color = "#4B7B9C", linewidth = 0.2, alpha = 0.8) +
    geom_sf(data = meridians, color = "#666666", linewidth = 0.3) +
    geom_sf(data = parallels, color = "#666666", linewidth = 0.3) +
    geom_sf(data = states_aus, fill = NA, color = "#FF6B6B", linewidth = 0.6, linetype = "dashed") +
    geom_sf(data = major_cities, color = "#000000", size = 2, shape = 16) +
    geom_text_repel(data = major_cities,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 3.5,
                    box.padding = 1.2,
                    point.padding = 1.0,
                    force = 3,
                    segment.color = "#999999",
                    min.segment.length = 0.1,
                    max.overlaps = 50,
                    bg.color = "white",
                    bg.r = 0.15) +
    geom_text_repel(data = state_label_positions,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 5,
                    fontface = "bold",
                    color = "#000000",
                    box.padding = 2.5,
                    point.padding = 2.0,
                    force = 15,
                    segment.color = "#999999",
                    segment.linetype = "dotted",
                    min.segment.length = 0.5,
                    max.overlaps = 20,
                    bg.color = "white",
                    bg.r = 0.2) +
    geom_text_repel(data = sea_labels,
                    aes(label = name_ru, geometry = geometry),
                    stat = "sf_coordinates",
                    size = 4,
                    fontface = "italic",
                    color = "#2A5F8A",
                    box.padding = 2.0,
                    point.padding = 1.5,
                    force = 5,
                    segment.color = NA,
                    bg.color = "white",
                    bg.r = 0.15,
                    min.segment.length = Inf) +
    annotate("text", 
             x = lon_labels_3577, 
             y = ylims[1] - 0.05 * y_range,
             label = paste0(lon_breaks_deg, "° в.д."),
             size = 3.5, 
             color = "#333333",
             fontface = "bold") +
    annotate("text", 
             x = rep(xlims[1] - 0.05 * x_range, length(lat_breaks_deg)), 
             y = lat_labels_3577,
             label = paste0(abs(lat_breaks_deg), "° ю.ш."),
             size = 3.5, 
             color = "#333333", 
             hjust = 1,
             fontface = "bold") +
    annotation_scale(location = "bl",
                     width_hint = 0.18,
                     height = unit(0.2, "cm"),
                     line_width = 1,
                     bar_cols = c("black", "white"),
                     text_col = "black",
                     text_cex = 0.9) +
    coord_sf(xlim = xlims_expanded,
             ylim = ylims_expanded,
             expand = FALSE,
             crs = crs_aus) +
    theme_minimal() +
    theme(
        panel.grid.major = element_blank(),
        panel.grid.minor = element_blank(),
        panel.background = element_rect(fill = "#e6f0fa", color = "black", linewidth = 0.5),
        panel.border = element_rect(color = "black", fill = NA, linewidth = 0.5),
        axis.text = element_blank(),
        axis.title = element_blank(),
        axis.ticks = element_blank(),
        plot.title = element_text(hjust = 0.5, size = 16, face = "bold"),
        plot.margin = margin(2, 2, 2, 4, "cm")
    ) +
    labs(title = "АВСТРАЛИЯ (Australian Albers / EPSG:3577)")

print(map_final)

ggsave("australia_albers_3577_curved.png", map_final, width = 15, height = 12, dpi = 300, bg = "white")
cairo_pdf("australia_albers_3577_curved.pdf", width = 15, height = 12)
print(map_final)
dev.off()

cat("\n✅ Карта сохранена в:", getwd(), "\n")
cat("   - australia_albers_3577_curved.png\n")
cat("   - australia_albers_3577_curved.pdf\n")

library(sf)
library(ggplot2)
library(ggrepel)

# 1. Загрузка и подготовка
full_data <- st_read("E:/QGIS/ne_10m_land")
admin <- st_read("E:/QGIS/Australia_adm/Australia_adm02.shp")


bbox_geo <- c(xmin = 112, xmax = 154, ymin = -44, ymax = -9)
main_crop <- st_crop(full_data, bbox_geo)
admin_crop <- st_crop(admin, bbox_geo)

target_crs <- 3577
main_proj <- st_transform(main_crop, crs = target_crs)
admin_proj <- st_transform(admin_crop, crs = target_crs)

# 2. Координатная сетка
graticule <- st_graticule(lat = seq(-45, -5, by = 5),
                          lon = seq(110, 160, by = 5))
graticule_proj <- st_transform(graticule, crs = target_crs)

# 3. Обрезка по экстенту административных границ
bbox_proj <- st_bbox(admin_proj)
main_proj_clip <- st_crop(main_proj, bbox_proj)
admin_proj_clip <- st_crop(admin_proj, bbox_proj)

# 4. Точки для подписей
points_inside <- st_point_on_surface(admin_proj_clip)
points_inside$label <- admin_proj_clip$name

# 5. Ручная масштабная линейка
xmin <- bbox_proj["xmin"]
xmax <- bbox_proj["xmax"]
ymin <- bbox_proj["ymin"]
ymax <- bbox_proj["ymax"]

# Длина линейки: 20% от ширины карты, округлённая до целых километров
scale_km <- round((xmax - xmin) / 1000 * 0.2)
scale_km <- max(50, min(500, scale_km))  # ограничиваем от 50 до 500 км
scale_m <- scale_km * 1000

# Отступы от краёв: 5%
left_margin <- (xmax - xmin) * 0.05
bottom_margin <- (ymax - ymin) * 0.05

# Координаты начала и конца линейки
x_start <- xmin + left_margin
x_end <- x_start + scale_m
y_line <- ymin + bottom_margin

# 6. Построение карты
p <- ggplot() +
  geom_sf(data = main_proj_clip, fill = NA, color = "gray50", linewidth = 0.3) +
  geom_sf(data = admin_proj_clip, aes(fill = name), color = NA) +
  scale_fill_viridis_d(name = "Регион") +
  geom_sf(data = graticule_proj, color = "gray70", linewidth = 0.2) +
  geom_sf(data = admin_proj_clip, fill = NA, color = "black", linewidth = 0.4) +
  geom_sf_text(data = points_inside, aes(label = label),
               size = 3, color = "black", fontface = "bold",
               check_overlap = TRUE) +
  # Масштабная линейка
  geom_segment(aes(x = x_start, y = y_line, xend = x_end, yend = y_line),
               color = "black", linewidth = 0.6) +
  geom_segment(aes(x = x_start, y = y_line - (ymax-ymin)*0.002,
                   xend = x_start, yend = y_line + (ymax-ymin)*0.002),
               color = "black", linewidth = 0.4) +
  geom_segment(aes(x = x_end, y = y_line - (ymax-ymin)*0.002,
                   xend = x_end, yend = y_line + (ymax-ymin)*0.002),
               color = "black", linewidth = 0.4) +
  annotate("text", x = (x_start + x_end)/2, y = y_line - (ymax-ymin)*0.015,
           label = paste0(scale_km, " км"), size = 3) +
  coord_sf(xlim = c(xmin, xmax), ylim = c(ymin, ymax), expand = FALSE) +
  labs(title = "Австралия") +
  theme_minimal() +
  theme(plot.title = element_text(hjust = 0.5))

# 7. Сохранение в PNG
ggsave("E:/QGIS/Карта_Австралии.png", plot = p, width = 10, height = 8, dpi = 300)

  # и тут линейка
  annotate("rect", xmin=scale_x, xmax=scale_x+300000, ymin=scale_y-h, ymax=scale_y, fill="black", color="black", linewidth=0.1) +
  annotate("rect", xmin=scale_x+300000, xmax=scale_x+600000, ymin=scale_y-h, ymax=scale_y, fill="white", color="black", linewidth=0.1) +
  annotate("rect", xmin=scale_x+600000, xmax=scale_x+900000, ymin=scale_y-h, ymax=scale_y, fill="black", color="black", linewidth=0.1) +
  annotate("rect", xmin=scale_x, xmax=scale_x+300000, ymin=scale_y, ymax=scale_y+h, fill="white", color="black", linewidth=0.1) +
  annotate("rect", xmin=scale_x+300000, xmax=scale_x+600000, ymin=scale_y, ymax=scale_y+h, fill="black", color="black", linewidth=0.1) +
  annotate("rect", xmin=scale_x+600000, xmax=scale_x+900000, ymin=scale_y, ymax=scale_y+h, fill="white", color="black", linewidth=0.1) +
  annotate("text", x = seq(scale_x, scale_x + 900000, by = 300000), y = scale_y + h + 80000, 
           label = c("300", "0", "300", "600"), size = 2.4, color = "black") +
  annotate("text", x = scale_x + 1030000, y = scale_y + h + 80000, label = "km", size = 2.4, color = "black") +
  
  scale_fill_brewer(palette = "Set3", guide = "none") +
  
  # настройка сетки
  coord_sf(
    xlim = c(-3000000, 3000000),

    datum = st_crs(4326), # Принудительно используем градусы WGS84 для сетки
    expand = FALSE, 
    clip = "off"

  theme_minimal() +
  theme(
    # Голубой фон моря на всю картинку
    plot.background = element_rect(fill = "#add8e6", color = NA),
    
    # Рамка карты
    panel.background = element_rect(fill = NA, color = "white", linewidth = 1.2),
    
    # тут перенос сетки на передний план
    panel.ontop = TRUE, 
    panel.grid.major = element_line(color = "white", linetype = "solid", linewidth = 0.25),
    panel.grid.minor = element_blank(),
    
    # Настройка подписей осей

    axis.text.x = element_text(margin = margin(t = 15)), # Отступ снизу
    axis.text.y = element_text(margin = margin(r = 15)), # Отступ слева
    axis.title = element_blank(),
    
    # Поля вокруг всего изображения, чтобы вынесенный текст не обрезался
    plot.margin = margin(40, 40, 40, 40)
  )

``` r
require(ursa)
a <- ursa:::spatialize("Новая Земля")
'plotcrs' <- function(a,crs=4326) {
   g1 <- ursa:::spatialize(a,style=crs) |>
      spatial_grid() |>
      session_grid(expand=1.2)
   seqx <- seq(20,120,by=8)
   seqy <- seq(64,88,by=2)
   b <- expand.grid(lon=seqx,lat=seqy)
   s <- if (!ursa:::.isMerc()) 1 else 1/cos(b$lat*pi/180)
   b <- spatial_buffer(ursa:::spatialize(b),s*100*1e3)
   compose_open(dim=c(750,1300),pointsize=10)
   panel_new(blank="white")
   panel_decor(col="black",coastline.fill="#00000010"
              ,scalebar.w=100,scalebar.pos=c("topleft","bottomleft")
              ,graticule.lon=seqx,graticule.lat=seqy,graticule.margin=c(F,T,T,F)
              )
   panel_plot(b)
   compose_close()
}

library(sf)
library(tidyverse)
library(geosphere)
library(lubridate)
library(ggplot2)

file_path <- "2022-01-09_14-00_Sun.gpx"
points <- st_read(file_path, layer = "track_points")

track <- points %>%
  mutate(
    lon = st_coordinates(.)[,1],
    lat = st_coordinates(.)[,2],
    time = with_tz(as_datetime(time), tzone = "Europe/Moscow")
  ) %>%
  st_drop_geometry() %>%
  mutate(
    dist_diff = c(0, distHaversine(cbind(lon[-n()], lat[-n()]), cbind(lon[-1], lat[-1]))),
    time_diff = c(0, as.numeric(diff(time))),
    speed_kmh = ifelse(time_diff > 0, (dist_diff / time_diff) * 3.6, 0),
    cum_dist = cumsum(dist_diff)
  )

base_coord <- c(track$lon[1], track$lat[1])
track <- track %>% mutate(dist_from_base = distHaversine(cbind(lon, lat), base_coord))

gate_info <- track %>% slice(98)
gate_coord <- c(gate_info$lon, gate_info$lat)

track <- track %>% mutate(dist_to_gate = distHaversine(cbind(lon, lat), gate_coord))

gate_hits_indices <- which(track$dist_to_gate < 10)
real_hits <- c()

if(length(gate_hits_indices) > 0) {
  real_hits <- gate_hits_indices[1]
  for(i in 2:length(gate_hits_indices)) {
    last_hit_dist <- track$cum_dist[tail(real_hits, 1)]
    current_dist <- track$cum_dist[gate_hits_indices[i]]
    if(current_dist - last_hit_dist > 500) {
      real_hits <- c(real_hits, gate_hits_indices[i])
    }
  }
}

track <- track %>%
  mutate(segment_name = case_when(
    row_number() <  real_hits[1] ~ "1. Подход",
    row_number() >= real_hits[1] & row_number() < real_hits[2] ~ "2. Круг 1",
    row_number() >= real_hits[2] & row_number() < real_hits[3] ~ "3. Круг 2",
    row_number() >= real_hits[3] ~ "4. Уход",
    TRUE ~ "4. Уход"
  ))

final_stats <- track %>%
  group_by(segment_name) %>%
  summarise(
    Start_Time = min(time),
    End_Time = max(time),
    Distance_m = round(sum(dist_diff), 0),
    Avg_Speed_kmh = round(mean(speed_kmh, na.rm = TRUE), 2),
    Duration = paste0(sum(time_diff) %/% 60, " мин ", round(sum(time_diff) %% 60), " сек"),
    Irregularity = round(sd(speed_kmh, na.rm = TRUE) / mean(speed_kmh, na.rm = TRUE), 3)
  )

max_away <- max(track$dist_from_base)

print("--- СТАТИСТИКА ПО УЧАСТКАМ ---")
print(final_stats)
cat("\nМаксимальное удаление от базы:", round(max_away, 0), "метров\n")

ggplot(track, aes(x = lon, y = lat, color = segment_name)) +
  geom_path(linewidth = 1.2) +
  annotate("point", x = base_coord[1], y = base_coord[2], 
           color = "black", size = 4, shape = 17) +
  annotate("point", x = gate_coord[1], y = gate_coord[2], 
           color = "yellow", size = 4, shape = 18) +
  coord_fixed(ratio = 1.3) +
  scale_color_manual(values = c(
    "1. Подход" = "#D1E9FF",
    "2. Круг 1"    = "#6AB7FF", 
    "3. Круг 2"    = "#0059B3", 
    "4. Уход"   = "#FF6347"  
  )) +
  labs(
    title = "Анализ лыжной прогулки: 2 круга",
    x = "Долгота", y = "Широта", color = "Участок"
  ) +
  theme_minimal() +
  theme(legend.position = "bottom")
```

install.packages("gpx")
library(sf)
library(gpx)
library(adehabitatLT)
library(mapview)

setwd("/Users/ksusasaveleva/R_projects/Modeling/Ski")

loc <- st_read("2022-01-09_14-00_Sun.gpx", layer = "track_points") |>
  st_transform(32637)

loc$time <- as.POSIXct(loc$time, format = "%Y-%m-%d %H:%M:%S", tz = "UTC")
head(loc)
print(class(loc))
print(st_crs(loc))
# Извлеките координаты как обычные числа
coords <- st_coordinates(loc)
x_coords <- coords[, "X"]  # долгота
y_coords <- coords[, "Y"]  # широта

# Проверьте, что координаты - числа
print(class(x_coords))
print(head(x_coords))
lt1 <- as.ltraj(
  xy = cbind(x_coords, y_coords),  # важно: матрица, а не data.frame
  date = loc$time,                  # время POSIXct
  id = loc$track_seg_id,            # ID сегмента
  typeII = TRUE,                    # явно указываем тип II
  proj4string = sp::CRS(st_crs(loc)$proj4string)
)
plot(lt1) # полный трек из точек

df <- ld(lt1)
df$speed_kmh <- df$dist / df$dt * 3.6
df$cum_dist  <- cumsum(df$dist)/1000

# расчет 1-го круга
dist_1 <- df[["dist"]][94:395]
sum(dist_1)
# 1 круг с начинается с разгона 8.87 км/ч
t1 <- df[94:395,]
dlt1 <- dl(t1)
df_t1 <- ld(dlt1)
time_1 <- df_t1 |>
  summarise(finish1 = max(date, na.rm = TRUE),
            start1 = min(date, na.rm = TRUE))

# расчет по 2-му кругу
dist_2 <- df[["dist"]][396:690]
sum(dist_2)
# 2 круг заканчивается максимальной скоростью 11.87 км/ч
t2 <- df[396:690,]
dlt2 <- dl(t2)
df_t2 <- ld(dlt2)
time_2 <- df_t2 |>
  summarise(finish2 = max(date, na.rm = TRUE),
            start2 = min(date, na.rm = TRUE))

# расстояние от базы до начала круга
b_start <- df[["dist"]][1:93]
sum(b_start)
b_start <- df[1:93,]
b_start <- dl(b_start)
df_b_start <- ld(b_start)

# и наоборот
start_b <- df[["dist"]][691:834]
sum(start_b)

# получилось 258.7 туда и 432.9 обратно 
# (скорее 258.7 м, потому что на обратном пути появляется крюк)

# всего
all_dist <- df[["dist"]][1:834]
sum(all_dist)
# всего минус путь от и до базы
track_dist <- df[["dist"]][94:690]
sum(track_dist)

plot(df_t1$x, df_t1$y, type = "l", col = "red", lwd = 2,
     xlim = c(388500, 389100),
     ylim = c(6289500, 6290250),
     xlab = "X",
     ylab = "Y")
lines(df_t2$x, df_t2$y, col = "blue", lwd = 2)
lines(df_b_start$x, df_b_start$y, col = "green", lwd = 2)
legend ("bottomright",
  legend = c("Путь от/до базы", "1-ый круг","2-ой круг"),
  col = c("green", "red", "blue"),
  lty = c(1, 1, 1),
  lwd = c(2, 2, 2))



# поиск удаленной точки ---------------------------------------------------

base_point <- df[1,] 
points_sf <- st_as_sf(df, coords = c("x", "y"), crs = st_crs(base_point))
base_point <- st_as_sf(base_point, coords = c("x", "y"), crs = st_crs(points_sf))
# Вычисляем расстояния до базы
distances <- st_distance(points_sf, base_point)

# Находим точку с максимальным расстоянием
max_dist_idx <- which.max(distances)
max_point <- points_sf[max_dist_idx, ]
max_distance <- distances[max_dist_idx]

# Результат
cat("Максимальное расстояние:", round(max_distance, 2), "метров\n")
cat("Координаты максимально удаленной от базы точки:", st_coordinates(max_point))

df_sf <- st_as_sf(df, coords = c("x", "y"), crs = 3572)
st_write(df_sf, "df.shp")

Задание| Оценить площадь каждой из обозначенных в легенде заприпайных полыней Карского моря из «Атласа биологического разнообразия морей и побережий российской Арктики» WWF России<sup>*</sup>, [стр. 35](https://wsbs-msu.ru/res/DOCFOLDER120/atlas_biol_ros_arkt_web.pdf#page=36). Береговую линию не оцифровывать, а вырезать по слою из набора [Natural Earth World GIS Data](https://www.naturalearthdata.com/) 1:10m. 
Отчетность| 1) PNG/TIFF/PDF с результатом привязки, 2) ESRI Shapefile (или любой GDAL формат) с результатом отрисовки, 3) таблица площадей полыней по результатам оцифровки.
Подсказки| Обрезку по береговой линии можно сделать либо маскированием по океану, либо исключением суши, см. [занятие](lesson08~b57.html#difference) по операциям с геометрией.

]

.footer[
<sup>*</sup> По состоянию на 30 апреля 2026 г. WWF России в реестре запрещённых в РФ организаций.
]

 #### Савельева Ксения

Большой опыт работы с ГИС, в Универе два курса, MapInfo. QGIS самостоятельно изучала, было достаточно легко. Рисовала карты в офисе. QGIS применяла для рисования карты для статьи. 

Владеет R, был курс в универе: для стат обработки данных, моделирования ареала, курс Лисовского. Очень любит карты.

В аспирантуре хотим нарисовать изотопную карту, должна изображать изотопный состав почвы, максимум - растений. Два изотопа, на отдельных станциях, научиться экстраполировать на территорию.

 #### Гурьянов Сергей


Опыт с ГИС есть, занимается лошадью Пржевальского в оренбуржье. Рожнов и Хосе предложили в инт-те добавить блок пространственной экологии.

Самостоятельно изучал QGIS, построение участков обитания: MCP 100%, пересечение, тепловая карта

Цифровая геоботаническая карта, как накладываются векторые карты на растры, как животные выбирают.

(function(d) {

  const preParents = [];
  const findPreParent = function(line, p = 0) {
    if (p > 1) return null; // traverse up no further than grandparent
    const el = line.parentElement;
    return el.tagName === "PRE" ? el : findPreParent(el, ++p);
