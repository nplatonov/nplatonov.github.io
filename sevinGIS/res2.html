<script>
// 1. Get the full current URL from the browser
let fullUrl = window.location.href;
console.log("Full URL:", fullUrl);
// Output: Full URL: https://nplatonov.github.io/sevinGIS/lesson06.html

// 2. Get the origin (protocol + domain)
let origin = window.location.origin;
console.log("Origin:", origin);
// Output: Origin: https://nplatonov.github.io

// 3. Get the pathname (the part after the domain)
let path = window.location.pathname;
console.log("Pathname:", path);
// Output: Pathname: /sevinGIS/lesson06.html

// 4. Split the pathname into parts using '/' as a separator
let pathParts = window.location.pathname.split('/');
console.log("Path parts array:", pathParts);
// Output: Path parts array: ["", "sevinGIS", "lesson06.html"]

// 5. Extract the base path you want: origin + the first directory
//    pathParts[0] is an empty string, pathParts[1] is "sevinGIS"
let baseUrl = window.location.origin + '/' + pathParts[1];
console.log("Base URL:", baseUrl);
// Output: Base URL: https://nplatonov.github.io/sevinGIS
</script>
